<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Minecraft Book ASCII Converter</title>
  <style>
    body { font-family: monospace; padding: 20px; background:#111; color:#eee; }
    #output, #preview {
      white-space: pre;
      border: 1px solid #444;
      padding: 10px;
      margin-top: 20px;
      background:#222;
    }
    label { margin-left: 10px; }
  </style>
</head>
<body>

<h2>Image → ASCII (Minecraft Book)</h2>

<input type="file" id="fileInput" accept="image/*">
<button id="convertBtn">Convert</button>

<label for="palette">Palette:</label>
<select id="palette">
  <option value="bw">Black & White</option>
  <option value="gray">Grayscale</option>
  <option value="vivid">Vivid Colors</option>
  <option value="warm">Warm Tones</option>
  <option value="cool">Cool Tones</option>
</select>

<label for="mode">Edition:</label>
<select id="mode">
  <option value="java">Java (full width)</option>
  <option value="bedrock">Bedrock (S4 dynamic)</option>
</select>

<h3>Minecraft Output</h3>
<div id="output"></div>

<h3>Live Book Preview</h3>
<div id="preview"></div>

<!-- IMPORTANT: bump version number when updating JS -->
<script src="app.js?v=7"></script>

</body>
</html>
