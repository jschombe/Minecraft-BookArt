<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Minecraft ASCII Converter</title>
  <style>
    body { font-family: sans-serif; background:#111; color:#eee; padding:20px; }
    #preview { background:#222; padding:10px; margin-top:10px; line-height:1; }
    #output { width:100%; height:200px; margin-top:10px; }
    label { margin-right:10px; }
  </style>
</head>
<body>

  <h1>Image → ASCII (Minecraft Book)</h1>

  <div>
    <label>Choose File:</label>
    <input type="file" id="fileInput" accept="image/*">
  </div>

  <div style="margin-top:10px;">
    <label>Color Palette:</label>
    <select id="palette">
      <option value="Color">Color</option>
      <option value="Black & White">Black & White</option>
    </select>

    <label style="margin-left:20px;">Edition:</label>
    <select id="mode">
      <option value="bedrock">Bedrock (S4 Safe)</option>
      <option value="java">Java</option>
    </select>

    <button id="convertBtn" style="margin-left:20px;">Convert</button>
  </div>

  <h2>Minecraft Output (copy this into your book)</h2>
  <textarea id="output" readonly></textarea>

  <h2>Live Color Preview</h2>
  <div id="preview"></div>

  <!-- IMPORTANT: This is the ONLY script now -->
  <script src="app.js?v=2"></script>

</body>
</html>
