<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Minecraft ASCII Converter</title>
  <style>
    body { font-family: sans-serif; background:#111; color:#eee; }
    .row { margin-bottom: 8px; }
    #preview { background:#222; padding:8px; margin-top:8px; line-height:1; }
    #output { width:100%; height:200px; margin-top:8px; }
    label { margin-right:8px; }
  </style>
</head>
<body>
  <h1>Minecraft ASCII Converter</h1>

  <div class="row">
    <label for="fileInput">Image:</label>
    <input type="file" id="fileInput" accept="image/*">
  </div>

  <div class="row">
    <label for="palette">Palette:</label>
    <select id="palette">
      <option value="Color">Color</option>
      <option value="Black &amp; White">Black &amp; White</option>
    </select>

    <label for="mode">Mode:</label>
    <select id="mode">
      <option value="bedrock">Bedrock</option>
      <option value="java">Java</option>
    </select>

    <button id="convertBtn">Convert</button>
  </div>

  <h2>Preview</h2>
  <div id="preview"></div>

  <h2>Raw Output</h2>
  <textarea id="output" readonly></textarea>

  <script src="app.js"></script>
</body>
</html>
